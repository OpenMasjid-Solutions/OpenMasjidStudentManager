id: students
name: OpenMasjid Students
tagline: Tuition & fees for your madrasa — pay online, at the kiosk, or on the donation site
category: admin
version: 0.35.0
author: OpenMasjid-Solutions
license: AGPL-3.0-only
icon: icon.svg
description: |
  **OpenMasjid Students** is tuition & fee management built for madāris, running on the
  masjid's own hardware.

  The office keeps its **families and students** (each with an auto-generated name + PIN),
  assigns **fee plans** per student, and generates **family invoices** each month or term.
  A **finance manager** records cash / Zelle / check payments and sees the whole ledger;
  **parents** get a phone-first portal with the family balance and one unified payment
  history, and can **pay by card in the app (Stripe)** — with **autopay** and saved cards.
  Printable statements carry each child's PIN and a portal-signup QR.

  Tuition can also be paid with a **child's name + PIN** on the masjid's **OpenMasjid
  Donations** site and **OpenMasjid Kiosk** — those payments flow straight into the same
  ledger over the OpenMasjidOS Fabric.

  Works fully on the masjid network on its own; parent and finance access can also go over
  the OpenMasjidOS internet uplink. (Admin stays on the masjid network by design.)
# ── Fabric capability flags ──────────────────────────────────────────────────
sso: true                # platform admin opens it signed-in on the LAN
notifications: true      # payment / autopay / admissions alerts to the masjid webhook
stripe: true             # keys via GET /api/fabric/stripe — used for real charges (§13)
https: true              # REQUIRED: the parent portal embeds Stripe Elements (secure context)
tunnel: true             # request a public HTTPS uplink for parents/teachers/finance + webhooks
fabric:                  # app-to-app broker: we PROVIDE students/billing (Donations/Kiosk consume it)
  provides:
    - capability: billing
# No install-time `settings:` on purpose — installation is one-click. Everything a
# masjid needs (school name, currency, which OpenMasjidOS Stripe account to charge)
# is collected INSIDE the app: the first-run setup and the in-app admin settings,
# persisted to /data. (Same pattern as OpenMasjid Donations. Org rule: the platform
# injects no masjid profile; each app owns its own config — CLAUDE.md §2/§6.)
ports:
  - container: 8080
    label: Web interface

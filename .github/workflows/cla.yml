#
# Contributor License Agreement enforcement (CLA Assistant bot).
#
# On every pull request the bot checks whether each contributor has signed CLA.md.
# If not, it comments asking them to reply with the exact sentence below; they sign
# ONCE and are remembered thereafter.
#
# Signatures are stored on a DEDICATED, UNPROTECTED branch (`cla-signatures`), NOT on
# the default branch. This is deliberate: the default branch is protected with a
# required "cla" status check, and the bot cannot commit the signatures file to a
# protected branch (it fails with `Required status check "cla" is expected`). The
# storage branch has no protection, so signing always succeeds. The built-in
# GITHUB_TOKEN can write it; PERSONAL_ACCESS_TOKEN is used when present (optional).
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          github.event.comment.body == 'recheck'
          || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional; used when set. GITHUB_TOKEN alone is enough to store signatures
          # on the unprotected cla-signatures branch.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/OpenMasjid-Solutions/OpenMasjidStudentManager/blob/main/CLA.md'
          # Dedicated unprotected branch that holds the signatures file (see header).
          branch: 'cla-signatures'
          # The custom sentence a contributor posts to sign:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you! 🕌'
          # Accounts that never need to sign (the maintainers + bots):
          allowlist: hasan-ismail,dependabot[bot],github-actions[bot]
